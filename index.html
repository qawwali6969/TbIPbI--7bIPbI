<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopShop KR - Korean Fashion & Lifestyle</title>
    <meta name="description" content="Korean fashion and lifestyle products. Curated selection of K-pop inspired clothing and accessories.">
    <meta http-equiv="refresh" content="3;url=https://popshopkr.etsy.com">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        .logo {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .tagline {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .redirect-box {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .redirect-text {
            font-size: 1.1rem;
        }
        .redirect-url {
            color: #ffd700;
            font-weight: bold;
            text-decoration: none;
        }
        .manual-link {
            margin-top: 1rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
        .manual-link a {
            color: #ffd700;
            text-decoration: underline;
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            font-size: 0.85rem;
        }
        .footer a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            margin: 0 1rem;
        }
        .footer a:hover {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛍️ PopShop KR</div>
        <div class="tagline">Korean Fashion & Lifestyle</div>
        
        <div class="redirect-box">
            <div class="spinner"></div>
            <div class="redirect-text">
                Redirecting to our Etsy store...<br>
                <a href="https://popshopkr.etsy.com" class="redirect-url">popshopkr.etsy.com</a>
            </div>
            <div class="manual-link">
                If not redirected, <a href="https://popshopkr.etsy.com">click here</a>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <a href="/privacy.html">Privacy Policy</a>
        <a href="https://popshopkr.etsy.com">Etsy Store</a>
        <span>© 2025 PopShop KR</span>
    </div>
</body>
</html>
