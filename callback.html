<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback - PopShop KR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .status {
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        .code-box {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            font-size: 0.85rem;
        }
        .btn {
            background: #ffd700;
            color: #333;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #ffed4a;
        }
        .hidden {
            display: none;
        }
        .success { color: #00ff88; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐</div>
        <h1>Pinterest Authorization</h1>
        
        <div id="loading" class="status">
            <p>Processing authorization...</p>
        </div>
        
        <div id="success" class="status hidden">
            <p class="success">✅ Authorization successful!</p>
            <p>Authorization code:</p>
            <div id="code" class="code-box"></div>
            <p style="font-size: 0.9rem; margin-top: 1rem;">
                This code will be exchanged for an access token.
            </p>
        </div>
        
        <div id="error" class="status hidden">
            <p class="error">❌ Authorization failed</p>
            <p id="error-message"></p>
        </div>
        
        <a href="/" class="btn">Back to Home</a>
    </div>
    
    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const state = urlParams.get('state');
        
        const loadingEl = document.getElementById('loading');
        const successEl = document.getElementById('success');
        const errorEl = document.getElementById('error');
        const codeEl = document.getElementById('code');
        const errorMsgEl = document.getElementById('error-message');
        
        if (error) {
            loadingEl.classList.add('hidden');
            errorEl.classList.remove('hidden');
            errorMsgEl.textContent = `Error: ${error}`;
        } else if (code) {
            loadingEl.classList.add('hidden');
            successEl.classList.remove('hidden');
            codeEl.textContent = code;
            
            // In production, this code would be sent to your backend
            // to exchange for an access token
            console.log('Authorization code:', code);
            console.log('State:', state);
        } else {
            loadingEl.classList.add('hidden');
            errorEl.classList.remove('hidden');
            errorMsgEl.textContent = 'No authorization code received.';
        }
    </script>
</body>
</html>
